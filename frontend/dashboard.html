<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>AI MedLab - Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <style>
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #333;
            color: #fff;
            padding: 15px 30px;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        .header h1 {
            margin: 0;
        }
        
        .logout-btn {
            background-color: #e74c3c;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .logout-btn:hover {
            background-color: #c0392b;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            padding-top: 100px;
        }
        
        .section {
            display: none;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .section.active {
            display: block;
        }
        
        .section h2 {
            border-bottom: 3px solid rgba(255, 255, 255, 0.5);
            padding-bottom: 10px;
            margin-bottom: 20px;
            color: white;
        }
        
        .form-group {
            margin: 15px 0;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: white;
        }
        
        input[type="number"],
        input[type="email"],
        input[type="text"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            box-sizing: border-box;
            background-color: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(5px);
            color: #222;
        }
        
        input[type="number"]:focus,
        input[type="email"]:focus,
        input[type="text"]:focus,
        input[type="date"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.8);
            background-color: rgba(255, 255, 255, 0.3);
        }
        
        .symptom-grid {
            display: none;
        }
        
        .symptom-checkbox {
            display: none;
        }
        
        #symptom-select {
            display: none;
        }
        
        .symptom-select-wrapper {
            margin-top: 5px;
            margin-bottom: 15px;
        }
        
        .symptom-select-button {
            width: 100%;
            padding: 10px;
            border: 2px solid #3498db;
            border-radius: 4px;
            background-color: rgba(255, 255, 255, 0.98);
            color: #222;
            font-size: 14px;
            cursor: pointer;
            text-align: left;
            font-weight: normal;
        }
        
        .symptom-select-button:hover {
            background-color: rgba(240, 240, 240, 0.95);
        }
        
        .symptom-select-dropdown {
            display: none;
            position: absolute;
            background-color: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 2px solid #3498db;
            border-radius: 4px;
            padding: 10px;
            max-height: 300px;
            overflow-y: auto;
            width: 100%;
            box-sizing: border-box;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .symptom-select-dropdown.open {
            display: block;
        }
        
        .symptom-option {
            padding: 8px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            cursor: pointer;
            border-radius: 3px;
        }
        
        .symptom-option:hover {
            background-color: rgba(102, 126, 234, 0.2);
        }
        
        .symptom-option label {
            color: #222;
        }
        
        .symptom-option input[type="checkbox"] {
            margin-right: 10px;
            cursor: pointer;
            width: 18px;
            height: 18px;
        }
        
        .symptom-option label {
            margin: 0;
            cursor: pointer;
            flex: 1;
            font-weight: normal;
        }
        
        button {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.8), rgba(118, 75, 162, 0.8));
            color: white;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            margin-right: 10px;
            display: inline-block;
            min-width: 150px;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        
        button:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 1), rgba(118, 75, 162, 1));
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        .section button {
            display: inline-block;
            width: auto;
            margin: 15px 10px 15px 0;
        }
        
        .section h3 {
            color: white;
            margin-top: 30px;
            margin-bottom: 15px;
        }
        
        .section h4 {
            color: white;
        }
        
        .result-box {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            display: none;
        }
        
        .result-box.error {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }
        
        .result-box.show {
            display: block;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background-color: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(5px);
            border-radius: 8px;
            overflow: hidden;
        }
        
        th,
        td {
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px;
            text-align: left;
            color: #222;
        }
        
        th {
            background-color: rgba(102, 126, 234, 0.6);
            color: #222;
            font-weight: bold;
        }
        
        tr:nth-child(even) {
            background-color: rgba(242, 242, 242, 0.7);
        }
        
        tr:hover {
            background-color: rgba(232, 244, 248, 0.8);
        }
        
        .patient-card {
            background-color: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            padding: 15px;
            margin: 10px 0;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        .patient-card h3 {
            margin-top: 0;
            color: white;
        }
        
        .patient-info {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            margin: 5px 0;
        }
        
        .form-inline {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .form-inline input,
        .form-inline select {
            flex: 1;
            min-width: 200px;
        }
        
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            resize: vertical;
            min-height: 100px;
        }
        
        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            display: none;
        }
        
        .message.show {
            display: block;
        }
        
        .message.success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        
        .message.error {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        /* Modal Styles */
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 20px;
            overflow-y: auto;
        }
        
        .modal.show {
            display: flex !important;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background-color: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            animation: slideDown 0.3s ease-out;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.5);
            padding-bottom: 10px;
        }
        
        .modal-header h3 {
            color: white;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .modal-close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            padding: 0;
            margin: 0;
            line-height: 1;
        }
        
        .modal-close-btn:hover {
            color: white;
        }
        
        .modal .form-group {
            margin: 15px 0;
        }
        
        .modal .form-group label {
            font-weight: bold;
            color: white;
            margin-bottom: 8px;
            display: block;
        }
        
        .modal .form-group input,
        .modal .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            box-sizing: border-box;
            color: #222;
        }
        
        .modal .form-group textarea {
            resize: vertical;
            min-height: 150px;
        }
        
        .modal textarea:focus,
        .modal input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }
        
        .modal-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin: 0;
        }
        
        .btn-submit {
            background-color: #667eea;
            color: white;
        }
        
        .btn-submit:hover {
            background-color: #5568d3;
        }
        
        .btn-cancel {
            background-color: #ddd;
            color: #222;
        }
        
        .btn-cancel:hover {
            background-color: #ccc;
        }
        
        body {
            background: linear-gradient(135deg, #667eea, #764ba2, #6B8DD6) !important;
            background-attachment: fixed;
            min-height: 100vh;
        }
    </style>
</head>

<body>
    <!-- Header -->
    <div class="header">
        <h1>🏥 AI MedLab</h1>
        <div>
            <span id="welcome-msg" style="margin-right: 20px;"></span>
            <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>
    </div>

    <div class="container">
        <!-- PATIENT SECTION - SPLIT INTO TWO PAGES -->
        <div id="patient-section" class="section" style="display:flex; flex-direction:column; gap:40px;">
            <div style="display:flex; justify-content:center; gap:20px; margin-bottom:20px;">
                <button id="nav-predict" onclick="showPatientPage('predict')" style="min-width:160px;">🩺 Disease Prediction</button>
                <button id="nav-history" onclick="showPatientPage('history')" style="min-width:160px;">📋 History</button>
            </div>
            <div id="prediction-box" style="background-color: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); padding: 20px; border-radius: 8px; position:relative; display:block;">
                <h3 style="color: #222;">🩺 Predict Your Disease</h3>
                <div class="form-group">
                    <label style="color: #222;">🎂 Your Age:</label>
                    <input type="number" id="patient-age" placeholder="Enter your age" min="0" max="120" style="color:#222; background:#fff; border:1px solid #bbb;">
                </div>
                <div class="form-group">
                    <label style="color: #222;">⚧ Your Gender:</label>
                    <select id="patient-gender">
                        <option value="" style="color:#222; background:#fff;">-- Select Gender --</option>
                        <option value="0" style="color:#222; background:#fff;">👨 Male</option>
                        <option value="1" style="color:#222; background:#fff;">👩 Female</option>
                        <option value="2" style="color:#222; background:#fff;">🧑 Other</option>
                    </select>
                </div>
                <h4 style="color: #222;">🩺 Select Your Symptoms:</h4>
                <div class="symptom-select-wrapper" style="position: relative; z-index: 20;">
                    <button type="button" class="symptom-select-button" onclick="toggleSymptomDropdown()">🔽 Click to select symptoms...</button>
                    <div id="symptom-dropdown" class="symptom-select-dropdown" style="z-index: 1001;">
                        <!-- Will be populated by JavaScript -->
                    </div>
                </div>
                <div id="selected-symptoms-display" style="margin-top: 10px; padding: 10px; background-color: rgba(0,0,0,0.03); border-radius: 4px; min-height: 30px; color: #222; border: 1px solid rgba(0,0,0,0.08);">✅ Selected: None</div>
                <select id="symptom-select" multiple style="display: none;"></select>
                <div id="symptom-container" class="symptom-grid"></div>
                <button onclick="predict()">🔍 Predict Disease</button>
                <div id="prediction-result" class="result-box"></div>
            </div>
            <div id="history-box" style="display:none; background-color: rgba(255,255,255,0.98); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); padding: 20px; border-radius: 8px;">
                <h3 style="color: #222;">📋 📋 Your Medical History</h3>
                <button onclick="loadPatientHistory()">📂 Load History</button>
                <div id="patient-history-container" style="margin-top: 20px;"></div>
            </div>
        </div>


    </div>

    <!-- DOCTOR SECTION -->
    <div id="doctor-section" class="section">
        <h2>👨‍⚕️ Doctor Dashboard</h2>
        <div id="doctor-message" class="message"></div>
        <div id="patients-container" style="margin-top: 20px;"></div>
    </div>

    <!-- NURSE SECTION -->
    <div id="nurse-section" class="section">
        <h2>👩‍⚕️ Nurse Dashboard</h2>
        <div id="nurse-message" class="message"></div>

        <button onclick="loadNursePatients()">📈 Load Patient Tracking</button>

        <div id="patient-tracking-container" style="margin-top: 20px;"></div>
    </div>

    <!-- Health Tips Modal -->
    <div id="tips-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>💊 Add Health Tips & Appointment</h3>
                <button class="modal-close-btn" onclick="closeTipsModal()">&times;</button>
            </div>
            <div class="form-group">
                <label style="color:#222;">📧 Patient Email:</label>
                <input type="text" id="tips-modal-email" readonly disabled>
            </div>
            <div class="form-group">
                <label style="color:#222;">🏥 Disease:</label>
                <input type="text" id="tips-modal-disease" readonly disabled>
            </div>
            <div class="form-group">
                <label style="color:#222;">👨‍⚕️ Doctor Name:</label>
                <input type="text" id="tips-modal-doctor-name" placeholder="e.g., Dr. John Smith">
            </div>
            <div class="form-group" style="text-align: center; margin: 10px 0;">
                <button type="button" class="btn" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-size: 14px;" onclick="autoGenerateHealthTips()">
                        🤖 Auto-Generate Health Tips
                    </button>
            </div>
            <div class="form-group">
                <label style="color:#222;">💊 Health Tips/Recommendations:</label>
                <textarea id="tips-modal-tips" placeholder="e.g., Rest, drink water, take prescribed medication, follow up in 1 week"></textarea>
            </div>
            <div class="form-group">
                <label style="color:#222;">📅 Appointment Date (YYYY-MM-DD):</label>
                <input type="date" id="tips-modal-appointment" placeholder="e.g., 2026-03-01">
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeTipsModal()">❌ Cancel</button>
                <button class="btn-submit" onclick="submitTipsForm()">✅ Submit</button>
            </div>
        </div>
    </div>

    <!-- Nurse Report Modal -->
    <div id="report-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📝 Generate Comprehensive Nurse Report</h3>
                <button class="modal-close-btn" onclick="closeReportModal()">&times;</button>
            </div>
            <div class="form-group">
                <label>📧 Patient Email:</label>
                <input type="text" id="report-modal-email" readonly disabled>
            </div>
            <div class="form-group">
                <label>🏥 Disease Being Treated:</label>
                <input type="text" id="report-modal-disease" readonly disabled placeholder="Disease will be auto-filled">
            </div>
            <div class="form-group">
                <label>👩‍⚕️ Nurse Name:</label>
                <input type="text" id="report-modal-nurse-name" placeholder="e.g., Nurse Sarah Johnson">
            </div>

            <!-- Vital Signs Section -->
            <div style="background:#f0f9ff; padding:15px; border-radius:8px; margin-bottom:15px; border:2px solid #3b82f6;">
                <h4 style="margin:0 0 15px 0; color:#1e40af; display:flex; align-items:center; gap:8px;">
                    <span style="font-size:20px;">🩺</span> Patient Vital Signs
                </h4>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div class="form-group" style="margin:0;">
                        <label style="font-size:13px; font-weight:600;">🩸 Blood Pressure (mmHg):</label>
                        <input type="text" id="vital-bp" placeholder="e.g., 120/80" style="padding:8px;">
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label style="font-size:13px; font-weight:600;">🌡️ Temperature (°F/°C):</label>
                        <input type="text" id="vital-temp" placeholder="e.g., 98.6°F" style="padding:8px;">
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label style="font-size:13px; font-weight:600;">💓 Heart Rate (bpm):</label>
                        <input type="text" id="vital-hr" placeholder="e.g., 72 bpm" style="padding:8px;">
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label style="font-size:13px; font-weight:600;">🫁 Respiratory Rate (breaths/min):</label>
                        <input type="text" id="vital-rr" placeholder="e.g., 16/min" style="padding:8px;">
                    </div>
                </div>
                <div class="form-group" style="margin-top:10px;">
                    <label style="font-size:13px; font-weight:600;">📝 Patient Condition & Response:</label>
                    <textarea id="vital-condition" placeholder="Enter patient's current condition and response to treatment..." style="min-height:60px; padding:8px;"></textarea>
                </div>
                <div class="form-group" style="margin:0;">
                    <label style="font-size:13px; font-weight:600;">🔄 Follow-up Recommendations:</label>
                    <textarea id="vital-followup" placeholder="Enter follow-up recommendations..." style="min-height:60px; padding:8px;"></textarea>
                </div>
            </div>

            <div class="form-group">
                <label>📋 Health Report (Based on Health Conditions):</label>
                <textarea id="report-modal-content" placeholder="Click 'Auto-Generate Report' after filling vital signs above. You can also manually enter or edit the report here."></textarea>
            </div>
            <div class="modal-buttons" style="display: flex; gap: 10px; justify-content: space-between;">
                <div>
                    <button class="btn-submit" onclick="autoGenerateNurseReport()" style="background-color:#28a745;">🤖 Auto-Generate Report</button>
                </div>
                <div>
                    <button class="btn-cancel" onclick="closeReportModal()">❌ Cancel</button>
                    <button class="btn-submit" onclick="submitReportForm()">✅ Submit</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Shared Patient History Modal (Doctor/Nurse) -->
    <div id="patient-history-modal" class="modal">
        <div class="modal-content" style="max-width: 95%; width: 1200px; max-height: 85vh; overflow: auto;">
            <div class="modal-header">
                <h3 id="patient-history-modal-title">📜 Patient History</h3>
                <span style="margin-left: 12px; font-size: 12px; color: white; opacity: 0.9;">Latest First</span>
                <button class="modal-close-btn" onclick="closePatientHistoryModal()">&times;</button>
            </div>
            <div id="patient-history-modal-content" style="margin-top: 10px;"></div>
        </div>
    </div>
    </div>

    <!-- Hidden fields for storing user info -->
    <input type="hidden" id="current-user-email">
    <input type="hidden" id="current-user-name">
    <input type="hidden" id="current-user-role">

    <script src="/script.js" charset="UTF-8"></script>
    <script>
        function showPatientPage(page) {
            const predict = document.getElementById('prediction-box');
            const history = document.getElementById('history-box');
            const navPredict = document.getElementById('nav-predict');
            const navHistory = document.getElementById('nav-history');
            if (page === 'predict') {
                predict.style.display = 'block';
                history.style.display = 'none';
                navPredict.style.background = 'linear-gradient(135deg, #667eea, #764ba2)';
                navPredict.style.color = 'white';
                navHistory.style.background = '';
                navHistory.style.color = '';
            } else {
                predict.style.display = 'none';
                history.style.display = 'block';
                navHistory.style.background = 'linear-gradient(135deg, #667eea, #764ba2)';
                navHistory.style.color = 'white';
                navPredict.style.background = '';
                navPredict.style.color = '';
            }
        }
        // Show prediction page by default and hide patient section for non-patient roles
        window.addEventListener('DOMContentLoaded', function() {
            const role = localStorage.getItem('role');
            const patientSection = document.getElementById('patient-section');
            if (role !== 'patient' && patientSection) {
                patientSection.style.display = 'none';
            } else if (document.getElementById('prediction-box')) {
                showPatientPage('predict');
            }
        });
    </script>
</body>

</html>
