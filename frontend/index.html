<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>AI MedLab - Healthcare Management System</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .auth-header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 2;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e0e0e0;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 5px;
            font-size: 14px;
            text-align: center;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #999;
            font-size: 14px;
        }
        
        .toggle-link {
            margin-top: 20px;
            text-align: center;
        }
        
        .toggle-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: border-color 0.3s;
        }
        
        .toggle-link a:hover {
            border-bottom-color: #667eea;
        }
        
        .role-info {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #666;
            border-left: 4px solid #667eea;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>🏥 AI MedLab</h1>
            <p>🩺 AI Healthcare Management System</p>
        </div>

        <!-- Login Section -->
        <div id="login-section">
            <div class="role-info">
                🎭 Select your role: 👤 Patient, 👨‍⚕️ Doctor, or 👩‍⚕️ Nurse
            </div>

            <div class="form-group">
                <label>📧 Email Address</label>
                <input type="email" id="login-email" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label>🔒 Password</label>
                <input type="password" id="login-password" placeholder="Enter your password">
            </div>

            <div class="form-group">
                <label>👤 Login As</label>
                <select id="login-role">
                    <option value="">-- Select Role --</option>
                    <option value="patient">👤 Patient</option>
                    <option value="doctor">👨‍⚕️ Doctor</option>
                    <option value="nurse">👩‍⚕️ Nurse</option>
                </select>
            </div>

            <div class="form-actions">
                <button class="btn btn-primary" onclick="login()">🔓 Login</button>
            </div>

            <div class="divider">&mdash;&mdash; OR &mdash;&mdash;</div>

            <div class="toggle-link">
                Don't have an account? <a onclick="toggleRegister()">Register here</a>
            </div>

            <div id="login-message" class="message" style="display:none;"></div>
        </div>

        <!-- Registration Section -->
        <div id="register-section" style="display:none;">
            <div class="form-group">
                <label>👤 Full Name</label>
                <input type="text" id="reg-name" placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label>📧 Email Address</label>
                <input type="email" id="reg-email" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label>🔒 Password</label>
                <input type="password" id="reg-password" placeholder="Create a password (min 6 chars)">
            </div>

            <div class="form-group">
                <label>🎂 Age</label>
                <input type="number" id="reg-age" placeholder="Enter your age" min="1" max="120">
            </div>

            <div class="form-group">
                <label>⚧ Gender</label>
                <select id="reg-gender">
                    <option value="">-- Select Gender --</option>
                    <option value="Male">👨 Male</option>
                    <option value="Female">👩 Female</option>
                    <option value="Other">🧑 Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>🎭 Register As</label>
                <select id="reg-role">
                    <option value="">-- Select Role --</option>
                    <option value="patient">👤 Patient</option>
                    <option value="doctor">👨‍⚕️ Doctor</option>
                    <option value="nurse">👩‍⚕️ Nurse</option>
                </select>
            </div>

            <div class="form-actions">
                <button class="btn btn-primary" onclick="register()">✅ Create Account</button>
                <button class="btn btn-secondary" onclick="toggleRegister()">⬅️ Back</button>
            </div>

            <div id="register-message" class="message" style="display:none;"></div>
        </div>
    </div>

    <script src="/script.js" charset="UTF-8"></script>
    <script>
        // Inline debug initialization
        if (document.getElementById("debug-url")) {
            document.getElementById("debug-url").textContent = window.location.href;
        }

        // Verify form elements are accessible
        console.log("=== PAGE LOAD DEBUG ===");
        console.log("Current Page:", window.location.href);
        console.log("login-email element:", document.getElementById("login-email") ? "FOUND" : "MISSING");
        console.log("reg-name element:", document.getElementById("reg-name") ? "FOUND" : "MISSING");
        console.log("All form elements:", {
            loginEmail: !!document.getElementById("login-email"),
            loginPassword: !!document.getElementById("login-password"),
            regName: !!document.getElementById("reg-name"),
            regEmail: !!document.getElementById("reg-email"),
            regPassword: !!document.getElementById("reg-password"),
            regAge: !!document.getElementById("reg-age"),
            regGender: !!document.getElementById("reg-gender"),
            regRole: !!document.getElementById("reg-role")
        });
    </script>
</body>

</html>
